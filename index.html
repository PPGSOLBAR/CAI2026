<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0, maximum-scale=1.0"
    />
    <title>Presensi CAI 2026</title>
    <link rel="icon" type="image/png" href="./assets/PPG.png?v=2" />
    <link rel="shortcut icon" href="./assets/PPG.png?v=2" />
    <link rel="apple-touch-icon" sizes="180x180" href="./assets/PPG.png?v=2" />
    <style>
      :root {
        --navy: #1e2a4a;
        --navy-light: #2c3b63;
        --blue: #3b5bff;
        --blue-dark: #2c46d6;
        --green: #16a34a;
        --green-bg: #e9f8ef;
        --red: #dc2626;
        --red-bg: #fdedec;
        --gray-bg: #f3f5f9;
        --gray-line: #e2e6ee;
        --ink: #1c2333;
        --ink-soft: #6b7280;
        --white: #ffffff;
        --radius: 16px;
        --shadow: 0 8px 24px rgba(30, 42, 74, 0.08);
      }

      * {
        box-sizing: border-box;
      }

      body {
        font-family:
          "Inter",
          "Segoe UI",
          system-ui,
          -apple-system,
          Tahoma,
          Geneva,
          Verdana,
          sans-serif;
        margin: 0;
        padding: 0;
        background: var(--gray-bg);
        color: var(--ink);
        min-height: 100vh;
      }

      .app {
        max-width: 480px;
        margin: 0 auto;
        min-height: 100vh;
        background: var(--gray-bg);
        display: flex;
        flex-direction: column;
      }

      /* ---------- Header ---------- */
      header {
        background: linear-gradient(
          135deg,
          var(--navy) 0%,
          var(--navy-light) 100%
        );
        padding: 22px 20px 20px;
        color: var(--white);
        border-radius: 0 0 22px 22px;
        box-shadow: var(--shadow);
      }

      .brand-row {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 14px;
      }

      .brand-mark {
        width: 38px;
        height: 38px;
        border-radius: 10px;
        background: rgba(255, 255, 255, 0.12);
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
      }

      .brand-mark svg {
        width: 20px;
        height: 20px;
      }

      .brand-text h1 {
        font-size: 16px;
        font-weight: 700;
        margin: 0;
        letter-spacing: 0.2px;
      }

      .brand-text p {
        font-size: 12px;
        margin: 2px 0 0;
        color: rgba(255, 255, 255, 0.65);
        font-weight: 500;
      }

      .session-card {
        background: rgba(255, 255, 255, 0.08);
        border: 1px solid rgba(255, 255, 255, 0.12);
        border-radius: 12px;
        padding: 12px 14px;
      }

      .session-card label {
        display: block;
        font-size: 11px;
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.6px;
        color: rgba(255, 255, 255, 0.6);
        margin-bottom: 8px;
      }

      .select-wrap {
        position: relative;
      }

      select#sesiSelect {
        width: 100%;
        padding: 11px 38px 11px 12px;
        border-radius: 9px;
        border: none;
        font-size: 15px;
        font-weight: 600;
        background-color: var(--white);
        color: var(--ink);
        cursor: pointer;
        appearance: none;
        -webkit-appearance: none;
      }

      .select-wrap::after {
        content: "";
        position: absolute;
        right: 14px;
        top: 50%;
        width: 9px;
        height: 9px;
        border-right: 2px solid var(--ink-soft);
        border-bottom: 2px solid var(--ink-soft);
        transform: translateY(-65%) rotate(45deg);
        pointer-events: none;
      }

      select#sesiSelect:focus-visible {
        outline: 3px solid rgba(59, 91, 255, 0.5);
        outline-offset: 2px;
      }

      /* ---------- Main ---------- */
      main {
        flex: 1;
        padding: 20px;
        display: flex;
        flex-direction: column;
        gap: 16px;
      }

      .scan-panel {
        background: var(--white);
        border-radius: var(--radius);
        padding: 16px;
        box-shadow: var(--shadow);
      }

      .scan-panel-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 12px;
      }

      .scan-panel-head h2 {
        font-size: 14px;
        font-weight: 700;
        margin: 0;
        color: var(--ink);
      }

      .live-dot {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        font-size: 11px;
        font-weight: 600;
        color: var(--green);
        background: var(--green-bg);
        padding: 4px 10px;
        border-radius: 999px;
      }

      .live-dot span.dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: var(--green);
        box-shadow: 0 0 0 0 rgba(22, 163, 74, 0.5);
        animation: pulse 1.6s infinite;
      }

      @keyframes pulse {
        0% {
          box-shadow: 0 0 0 0 rgba(22, 163, 74, 0.45);
        }
        70% {
          box-shadow: 0 0 0 6px rgba(22, 163, 74, 0);
        }
        100% {
          box-shadow: 0 0 0 0 rgba(22, 163, 74, 0);
        }
      }

      #reader {
        width: 100%;
        border-radius: 12px;
        overflow: hidden;
        background: #0e1424;
        min-height: 260px;
      }

      /* tame the library's default inline styling a bit */
      #reader img {
        border-radius: 0;
      }

      .hint {
        text-align: center;
        font-size: 12.5px;
        color: var(--ink-soft);
        margin-top: 12px;
        line-height: 1.5;
      }

      /* ---------- Result ---------- */
      #result {
        display: none;
        border-radius: var(--radius);
        padding: 18px;
        box-shadow: var(--shadow);
      }

      #result.proses {
        background: var(--white);
        border: 1px solid var(--gray-line);
      }

      #result.sukses {
        background: var(--green-bg);
        border: 1px solid #bfe6cc;
      }

      #result.gagal {
        background: var(--red-bg);
        border: 1px solid #f3c9c6;
      }

      .result-row {
        display: flex;
        align-items: flex-start;
        gap: 12px;
      }

      .result-icon {
        flex-shrink: 0;
        width: 40px;
        height: 40px;
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
      }

      #result.sukses .result-icon {
        background: var(--green);
      }

      #result.gagal .result-icon {
        background: var(--red);
      }

      #result.proses .result-icon {
        background: var(--gray-line);
      }

      .result-icon svg {
        width: 20px;
        height: 20px;
        stroke: white;
      }

      .result-body {
        flex: 1;
        min-width: 0;
      }

      .result-title {
        font-size: 15px;
        font-weight: 700;
        margin: 0 0 6px;
      }

      #result.sukses .result-title {
        color: #0e5c2c;
      }

      #result.gagal .result-title {
        color: #8d231f;
      }

      #result.proses .result-title {
        color: var(--ink);
      }

      .result-detail {
        font-size: 13px;
        color: var(--ink-soft);
        line-height: 1.6;
      }

      .result-detail b {
        color: var(--ink);
        font-weight: 600;
      }

      .detail-grid {
        display: grid;
        grid-template-columns: auto 1fr;
        gap: 4px 10px;
        margin-top: 4px;
        font-size: 13px;
      }

      .detail-grid dt {
        color: var(--ink-soft);
        font-weight: 500;
      }

      .detail-grid dd {
        margin: 0;
        font-weight: 700;
        color: var(--ink);
      }

      .detail-grid dd.mono {
        font-variant-numeric: tabular-nums;
      }

      footer {
        text-align: center;
        padding: 14px 20px 22px;
        font-size: 11.5px;
        color: var(--ink-soft);
      }

      @media (prefers-reduced-motion: reduce) {
        .live-dot span.dot {
          animation: none;
        }
      }
    </style>
    <script src="https://unpkg.com/html5-qrcode"></script>
  </head>
  <body>
    <div class="app">
      <header>
        <div class="brand-row">
          <div class="brand-mark">
            <svg
              viewBox="0 0 24 24"
              fill="none"
              xmlns="http://www.w3.org/2000/svg"
            >
              <rect
                x="3"
                y="3"
                width="7"
                height="7"
                rx="1.5"
                stroke="white"
                stroke-width="1.8"
              />
              <rect
                x="14"
                y="3"
                width="7"
                height="7"
                rx="1.5"
                stroke="white"
                stroke-width="1.8"
              />
              <rect
                x="3"
                y="14"
                width="7"
                height="7"
                rx="1.5"
                stroke="white"
                stroke-width="1.8"
              />
              <path d="M14 14H17V17H14V14Z" fill="white" />
              <path d="M18 14H21V17H18V14Z" fill="white" />
              <path d="M14 18H17V21H14V18Z" fill="white" />
              <path d="M18 18H21V21H18V18Z" fill="white" />
            </svg>
          </div>
          <div class="brand-text">
            <h1>Presensi CAI 2026</h1>
            <p>Pemindai kode QR peserta</p>
          </div>
        </div>

        <div class="session-card">
          <label for="sesiSelect">Sesi pertemuan saat ini</label>
          <div class="select-wrap">
            <select id="sesiSelect">
              <option value="Sesi 1">Sesi 1 — Pagi</option>
              <option value="Sesi 2">Sesi 2 — Siang</option>
              <option value="Sesi 3">Sesi 3 — Sore</option>
            </select>
          </div>
        </div>
      </header>

      <main>
        <div class="scan-panel">
          <div class="scan-panel-head">
            <h2>Arahkan kamera ke kode QR</h2>
            <span class="live-dot"><span class="dot"></span>Aktif</span>
          </div>
          <div id="reader"></div>
          <p class="hint">
            Pastikan kode QR berada di dalam kotak pemindai dan pencahayaan
            cukup.
          </p>
        </div>

        <div id="result"></div>
      </main>

      <footer>CAI 2026 · Sistem presensi internal</footer>
    </div>

    <script>
      // TENTUKAN URL GOOGLE APPS SCRIPT ANDA DI SINI
      const WEB_APP_URL =
        "https://script.google.com/macros/s/AKfycbxCMy_wo_WZLnBXB2nX_-7e9T7zfvI7yTQh9zBdiZL3-57XAa6Z0W7jgHS9PMCngfpRHg/exec";
      var html5QrcodeScanner;

      const ICONS = {
        sukses:
          '<svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M5 13l4 4L19 7" stroke="white" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/></svg>',
        gagal:
          '<svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><path d="M6 6l12 12M18 6L6 18" stroke="white" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"/></svg>',
        proses:
          '<svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg"><circle cx="12" cy="12" r="9" stroke="#9aa3b2" stroke-width="2"/><path d="M12 7v5l3 2" stroke="#9aa3b2" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/></svg>',
      };

      function renderResult(state, titleHtml, detailHtml) {
        var resultDiv = document.getElementById("result");
        resultDiv.style.display = "block";
        resultDiv.className = state;
        resultDiv.innerHTML =
          '<div class="result-row">' +
          '<div class="result-icon">' +
          ICONS[state] +
          "</div>" +
          '<div class="result-body">' +
          '<p class="result-title">' +
          titleHtml +
          "</p>" +
          detailHtml +
          "</div>" +
          "</div>";
      }

      function onScanSuccess(decodedText, decodedResult) {
        html5QrcodeScanner.clear();

        var sesiTerpilih = document.getElementById("sesiSelect").value;

        renderResult(
          "proses",
          "Mengirim data ke server…",
          '<p class="result-detail">Mohon tunggu sebentar.</p>',
        );

        // Mengirim data menggunakan Fetch API standar (Bypass Iframe)
        fetch(WEB_APP_URL, {
          method: "POST",
          mode: "cors",
          // Mengirim sebagai text/plain agar browser tidak memicu CORS preflight OPTIONS yang diblokir Google
          body: JSON.stringify({ barcodeId: decodedText, sesi: sesiTerpilih }),
        })
          .then((response) => response.json())
          .then((response) => {
            if (response.status === "Sukses") {
              renderResult(
                "sukses",
                "Berhasil masuk",
                '<dl class="detail-grid">' +
                  "<dt>Nama</dt><dd>" +
                  response.nama +
                  "</dd>" +
                  "<dt>Sesi</dt><dd>" +
                  response.sesi +
                  "</dd>" +
                  '<dt>Jam</dt><dd class="mono">' +
                  response.jam +
                  "</dd>" +
                  "</dl>",
              );
            } else {
              renderResult(
                "gagal",
                "ID tidak terdaftar",
                '<dl class="detail-grid">' +
                  "<dt>ID</dt><dd>" +
                  decodedText +
                  "</dd>" +
                  "<dt>Status</dt><dd>Peserta tidak dikenal</dd>" +
                  "</dl>",
              );
            }
            setTimeout(startScanner, 2500);
          })
          .catch((error) => {
            renderResult(
              "gagal",
              "Gagal terhubung ke server",
              '<p class="result-detail">' + error.message + "</p>",
            );
            setTimeout(startScanner, 3000);
          });
      }

      function startScanner() {
        document.getElementById("result").style.display = "none";
        html5QrcodeScanner = new Html5QrcodeScanner("reader", {
          fps: 10,
          qrbox: 250,
        });
        html5QrcodeScanner.render(onScanSuccess);
      }

      window.onload = startScanner;
    </script>
  </body>
</html>
